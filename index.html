<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart School Manager</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="sidebar">
      <button id="themeBtn" onclick="toggleDarkMode()">🌙 Dark Mode</button>
      <h2>🏫 School Manager</h2>

      <button onclick="showPage('dashboard')">Dashboard</button>
      <button onclick="showPage('students')">Students</button>
      <button onclick="showPage('attendance')">Attendance</button>
      <button onclick="showPage('marks')">Marks</button>
    </div>

    <div class="main">
      <!-- Dashboard -->
      <div id="dashboard">
        <div class="cards">
          <div class="card">
            <h3>Total Students</h3>
            <p id="totalStudents">0</p>
          </div>

          <div class="card">
            <h3>Present</h3>
            <p id="presentCount">0</p>
          </div>

          <div class="card">
            <h3>Absent</h3>
            <p id="absentCount">0</p>
          </div>
        </div>
      </div>

      <!-- Students -->
      <div id="students" class="hidden">
        <div class="form-box">
          <input type="text" id="name" placeholder="Student Name" />
          <input type="text" id="roll" placeholder="Roll No" />
          <input type="text" id="studentClass" placeholder="Class" />

          <button onclick="addStudent()">Add Student</button>
        </div>

        <table>
          <thead>
            <tr>
              <th>Roll</th>
              <th>Name</th>
              <th>Class</th>
              <th>Action</th>
            </tr>
          </thead>

          <tbody id="studentTable"></tbody>
        </table>
      </div>

      <!-- Attendance -->
      <div id="attendance" class="hidden">
        <table>
          <thead>
            <tr>
              <th>Roll</th>
              <th>Name</th>
              <th>Present</th>
              <th>Absent</th>
            </tr>
          </thead>

          <tbody id="attendanceTable"></tbody>
        </table>
      </div>

      <!-- Marks -->
      <div id="marks" class="hidden">
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Math</th>
              <th>English</th>
              <th>Science</th>
              <th>Percentage</th>
              <th>Grade</th>
            </tr>
          </thead>

          <tbody id="marksTable"></tbody>
        </table>
      </div>
    </div>

    <script src="index.js"></script>
  </body>
</html>
